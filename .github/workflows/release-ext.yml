name: Build & Release (WXT)

permissions:
  contents: write

on:
  push:
    tags:
      - "ext-v*" # example: ext-v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install deps
        run: bun install

      - name: Build app
        run: cd apps/extension && bun run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          WXT_GOOGLE_CLIENT_ID: ${{ vars.WXT_GOOGLE_CLIENT_ID }}

      - name: Zip extension
        run: |
          cd apps/extension/.output/chrome-mv3
          zip -r ../scrape-essentials-${{ github.ref_name }}.zip .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: apps/extension/.output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
